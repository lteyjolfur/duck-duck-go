<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="DuckDuckGo-inspired search homepage" />
    <meta name="application-name" content="DuckDuckGo " />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="preload" as="image" href="/logo192.png" fetchpriority="high" />
    <link rel="manifest" href="/manifest.json" />
    <title>DuckDuckGo-inspired search homepage</title>
    <script>
      (function () {
        try {
          const saved = localStorage.getItem('theme');

          const prefersDark = window.matchMedia(
            '(prefers-color-scheme: dark)'
          ).matches;

          document.documentElement.dataset.theme =
            saved || (prefersDark ? 'dark' : 'light');
        } catch {}
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root" role="main" aria-label="Main application content"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
